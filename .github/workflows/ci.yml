# CI — validate Docker builds, Django admin settings, lint, and the full test suite.
#
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: GitHub is deprecating Node 20 for Actions-hosted
# JavaScript (e.g. actions/checkout). Opt into Node 24 now to avoid runner failures.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  settings-check:
    name: Settings Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build django-admin image
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml build django-admin

      - name: Create backend/.env.dev for CI
        run: |
          set -e
          mkdir -p backend
          printf "%s\n" \
            "ENVIRONMENT=dev" \
            "DJANGO_SECRET_KEY=ci-dev-secret" \
            "ALLOWED_HOSTS=localhost,127.0.0.1" \
            > backend/.env.dev

      - name: Create backend/.env.staging for CI
        run: |
          set -e
          mkdir -p backend
          printf "%s\n" \
            "ENVIRONMENT=staging" \
            "DJANGO_SECRET_KEY=ci-staging-secret" \
            "ALLOWED_HOSTS=localhost,127.0.0.1" \
            > backend/.env.staging

      - name: Validate DEV Django settings
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml run --rm \
            -e ENVIRONMENT=dev \
            django-admin \
            python backend/scripts/check_settings.py

      - name: Validate STAGING Django settings
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml run --rm \
            -e ENVIRONMENT=staging \
            django-admin \
            python backend/scripts/check_settings.py

      - name: Build backend (Node API) image
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml build backend

  quality:
    name: Lint and Tests
    runs-on: ubuntu-latest
    needs: settings-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai_service/requirements.txt

      - name: Run lint-all.sh
        run: bash scripts/lint-all.sh

      - name: Run test-all.sh
        run: bash scripts/test-all.sh
