# CI — validate Docker builds, Django admin settings, lint, and the full test suite.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  settings-check:
    name: Settings Validation
    runs-on: ubuntu-latest

    steps:
      # checkout@v5 runs on Node 24 natively (avoids Node 20 deprecation warnings on v4).
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build django-admin image
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml build django-admin

      - name: Validate DEV Django settings
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml run --rm \
            -e ENVIRONMENT=dev \
            django-admin \
            python backend/scripts/check_settings.py

      - name: Validate STAGING Django settings
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml run --rm \
            -e ENVIRONMENT=staging \
            django-admin \
            python backend/scripts/check_settings.py

      - name: Build backend (Node API) image
        run: |
          set -e
          docker compose -f infra/docker/docker-compose.yml build backend

  quality:
    name: Lint and Tests
    runs-on: ubuntu-latest
    needs: settings-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai_service/requirements.txt

      - name: Run lint-all.sh
        run: bash scripts/lint-all.sh

      - name: Run test-all.sh
        run: bash scripts/test-all.sh
