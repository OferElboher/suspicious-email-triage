###############################################################################
# Local stack: API, optional Node worker, Redpanda (Kafka API), Celery, dispatcher.
###############################################################################
services:
  # mongo: local dev document database for Review records and analysis results.
  mongo:
    container_name: triage-mongo
    image: mongo:6
    ports:
      # Host 27018 (not 27017) avoids clashing with a MongoDB install on WSL/Windows.
      - "27018:27017"
    volumes:
      # mongo-data: persists reviews across container rebuilds (without this, data is lost on recreate).
      - mongo-data:/data/db
    restart: unless-stopped

  # redis: local dev broker/backend for Celery and lightweight API state.
  redis:
    container_name: triage-redis
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  # postgres: local dev statistics database for chart-friendly narrow events.
  postgres:
    container_name: triage-postgres
    image: postgres:16
    environment:
      # POSTGRES_DB: local stats database name used only by the dev stack.
      - POSTGRES_DB=triage_stats
      # POSTGRES_USER: local stats database user for Node/Python services.
      - POSTGRES_USER=triage
      # POSTGRES_PASSWORD: local dev password; staging/prod use remote secrets.
      - POSTGRES_PASSWORD=triage
    ports:
      - "5432:5432"
    volumes:
      # postgres-data: persists auth_users (password hashes) and stats — required so rebuilds do not reset login.
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # neo4j: graph database for sender/url/domain relationships and campaign clustering.
  neo4j:
    container_name: triage-neo4j
    image: neo4j:5.26-community
    environment:
      - NEO4J_AUTH=neo4j/triage-neo4j-dev
    ports:
      # 7474 = Neo4j Browser (HTTP web UI for Cypher + graph visualization).
      - "7474:7474"
      # 7687 = Bolt (binary protocol used by neo4j-driver, DBeaver, and CLI tools).
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  # redpanda: local Kafka-compatible broker used by the async ingest event stream.
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.11
    container_name: triage-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      # Host 19092 maps to internal Kafka API 9092 (avoids conflict with other Kafka on 9092).
      - "19092:9092"
    restart: unless-stopped

  # mock-secrets-manager: DEV ONLY — local stand-in for AWS Secrets Manager (staging/prod use SECRETS_PROVIDER=aws).
  mock-secrets-manager:
    container_name: triage-mock-secrets-manager
    build:
      context: ../../
      dockerfile: infra/mock-aws-secrets-manager/Dockerfile
    ports:
      - "4566:4566"
    environment:
      - MOCK_SECRETS_PORT=4566
      - SECRETS_ROOT=/app/backend
    volumes:
      # Mount gitignored dev.secrets so the mock service can serve triage/dev without baking secrets into images.
      - ../../backend:/app/backend:ro
    restart: unless-stopped

  # mock-snowflake: DEV ONLY — in-memory Snowflake analytics API (staging/prod use real Snowflake URL).
  mock-snowflake:
    container_name: triage-mock-snowflake
    build:
      context: ../../
      dockerfile: infra/mock-aws-snowflake/Dockerfile
    ports:
      - "4567:4567"
    environment:
      - MOCK_SNOWFLAKE_PORT=4567
    restart: unless-stopped

  # mock-s3: DEV ONLY — in-memory Amazon S3 API for database backup uploads (staging/prod use real S3).
  mock-s3:
    container_name: triage-mock-s3
    build:
      context: ../../
      dockerfile: infra/mock-aws-s3/Dockerfile
    ports:
      - "4568:4568"
    environment:
      - MOCK_S3_PORT=4568
    restart: unless-stopped

  # elasticsearch: optional full-text search (single-node, 256MB heap — laptop-friendly).
  elasticsearch:
    container_name: triage-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.name=triage-dev
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    mem_limit: 512m
    restart: unless-stopped

  # backend: Node/Express API used by the React UI.
  backend:
    container_name: triage-backend
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    entrypoint: ["/bin/bash", "/app/scripts/docker-entrypoint-with-secrets.sh"]
    command: ["node", "scripts/preload-secrets.js"]
    ports:
      # 3000 = REST API (JWT auth, /reviews, /graph, /metrics). React dev server uses 3001 separately.
      - "3000:3000"
    env_file:
      # Profile env: defaults to backend/.env.dev; set DEPLOYMENT_ENV=staging|prod to switch.
      - ../../backend/.env.${DEPLOYMENT_ENV:-dev}
    volumes:
      - triage-logs:/var/log/triage
    depends_on:
      - mock-secrets-manager
      - mock-snowflake
      - mock-s3
      - mongo
      - postgres
      - redis
      - redpanda
      - mailpit
      - neo4j
      - elasticsearch
    restart: unless-stopped
    healthcheck:
      # Docker HEALTHCHECK uses Node fetch (no extra packages) against /health/ready.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # mailpit: dev SMTP sink + web UI for password-reset and other outbound email testing.
  mailpit:
    container_name: triage-mailpit
    image: axllent/mailpit:v1.21
    ports:
      # 1025 = SMTP (backend sends mail here in mailpit delivery mode).
      - "1025:1025"
      # 8025 = Mailpit web inbox UI (read captured emails in the browser).
      - "8025:8025"
    restart: unless-stopped

  # django-admin: Django admin UI for auth_users CRUD (admin role only).
  django-admin:
    container_name: triage-django-admin
    build:
      context: ../../
      dockerfile: backend/Dockerfile.django
    entrypoint: ["/bin/bash", "/app/scripts/docker-entrypoint-with-secrets.sh"]
    command:
      [
        "sh",
        "-c",
        "mkdir -p /app/backend/data && python backend/manage.py migrate --noinput && python backend/manage.py ensure_dev_bootstrap_admin && python backend/manage.py runserver 0.0.0.0:8000",
      ]
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/.env.${DEPLOYMENT_ENV:-dev}
    environment:
      - ENVIRONMENT=dev
      - DJANGO_SETTINGS_MODULE=triage_auth.django_admin_settings
      - DJANGO_ADMIN_SQLITE_PATH=/app/backend/data/django_admin.sqlite3
      - AI_SERVICE_ROOT=/app/ai_service
    volumes:
      - django-admin-state:/app/backend/data
    depends_on:
      - mock-secrets-manager
      - postgres
    restart: unless-stopped

  # worker: optional legacy Node BullMQ worker, started only with the legacy-bullmq profile.
  worker:
    container_name: triage-worker
    build:
      context: ../../
      dockerfile: backend/Dockerfile.worker
    env_file:
      # Profile env: defaults to backend/.env.dev; set DEPLOYMENT_ENV=staging|prod to switch.
      - ../../backend/.env.${DEPLOYMENT_ENV:-dev}
    volumes:
      - triage-logs:/var/log/triage
    depends_on:
      - mongo
      - postgres
      - redis
    profiles:
      - legacy-bullmq

  # ai-celery: Python worker that performs asynchronous scoring.
  ai-celery:
    build:
      context: ../../
      dockerfile: ai_service/Dockerfile
    container_name: triage-ai-celery
    entrypoint: ["/bin/bash", "/app/scripts/docker-entrypoint-with-secrets.sh"]
    command: ["celery", "-A", "app.celery_app", "worker", "-l", "info"]
    env_file:
      # Profile env: defaults to backend/.env.dev; set DEPLOYMENT_ENV=staging|prod to switch.
      - ../../backend/.env.${DEPLOYMENT_ENV:-dev}
    environment:
      - AI_SERVICE_ROOT=/app
    volumes:
      - triage-logs:/var/log/triage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mock-secrets-manager
      - mongo
      - postgres
      - redis
      - mock-llm
      - neo4j
    restart: unless-stopped

  # ai-kafka-dispatch: Python Kafka consumer that schedules Celery tasks.
  ai-kafka-dispatch:
    build:
      context: ../../
      dockerfile: ai_service/Dockerfile
    container_name: triage-ai-kafka-dispatch
    entrypoint: ["/bin/bash", "/app/scripts/docker-entrypoint-with-secrets.sh"]
    command: ["python", "kafka_dispatcher.py"]
    env_file:
      # Profile env: defaults to backend/.env.dev; set DEPLOYMENT_ENV=staging|prod to switch.
      - ../../backend/.env.${DEPLOYMENT_ENV:-dev}
    environment:
      - AI_SERVICE_ROOT=/app
    volumes:
      - triage-logs:/var/log/triage
    depends_on:
      - mock-secrets-manager
      - redpanda
      - redis
      - mock-llm
    restart: unless-stopped

  # mock-llm: OpenAI-compatible mock API (zero cost) for LLM_PROVIDER=mock_commercial demos.
  mock-llm:
    build:
      context: ../../
      dockerfile: ai_service/Dockerfile
    container_name: triage-mock-llm
    command: ["python", "-m", "mock_commercial_llm.server"]
    ports:
      - "8090:8090"
    environment:
      - MOCK_LLM_PORT=8090
      - LLM_API_KEY=dev-mock-key
    env_file:
      - ../../backend/.env.${DEPLOYMENT_ENV:-dev}
    restart: unless-stopped

volumes:
  # triage-logs: shared dev volume so API and workers append to one merged log.
  triage-logs:
  # mongo-data: review documents survive docker compose rebuilds.
  mongo-data:
  # postgres-data: auth_users password hashes survive docker compose rebuilds.
  postgres-data:
  # elasticsearch-data: persisted search index across rebuilds.
  elasticsearch-data:
  # neo4j-data: persisted graph state for phishing relationship analysis.
  neo4j-data:
  # django-admin-state: SQLite for Django sessions/admin log (keeps Postgres free of duplicate auth tables).
  django-admin-state:
