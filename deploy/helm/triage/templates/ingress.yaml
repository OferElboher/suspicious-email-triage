{{- if .Values.ingress.enabled }}
# Ingress — routes external HTTP to frontend (/) and optionally API (/api) via nginx class.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "triage.fullname" . }}
  labels:
    {{- include "triage.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "triage.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "triage.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "triage.fullname" . }}-tls
  {{- end }}
{{- end }}
