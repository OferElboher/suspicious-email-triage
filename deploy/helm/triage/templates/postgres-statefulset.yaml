{{- if .Values.postgres.enabled }}
# PostgreSQL StatefulSet — auth + analytics stats; password from Secret.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "triage.fullname" . }}-postgres
  labels:
    {{- include "triage.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "triage.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "triage.labels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "triage.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "triage.fullname" . }}-postgres
spec:
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
{{- end }}
