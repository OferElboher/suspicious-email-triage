# Secret keys — replace placeholders at install time (helm install --set secrets.jwtSecret=...).
# In production, prefer External Secrets Operator or cloud secret managers instead of plain Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "triage.fullname" . }}-secrets
  labels:
    {{- include "triage.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  GRAPH_INTERNAL_TOKEN: {{ .Values.secrets.graphInternalToken | quote }}
