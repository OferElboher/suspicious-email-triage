{{- if .Values.celeryWorker.enabled }}
# Celery worker — processes LLM scoring and graph sync tasks from Redis queue.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "triage.fullname" . }}-celery
  labels:
    {{- include "triage.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.celeryWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: celery
  template:
    metadata:
      labels:
        app.kubernetes.io/component: celery
        {{- include "triage.labels" . | nindent 8 }}
    spec:
      containers:
        - name: celery
          image: "{{ .Values.celeryWorker.image.repository }}:{{ .Values.celeryWorker.image.tag }}"
          imagePullPolicy: {{ .Values.celeryWorker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "triage.fullname" . }}-config
            - secretRef:
                name: {{ include "triage.fullname" . }}-secrets
{{- end }}
