{{- if .Values.redis.enabled }}
# Redis Deployment — Celery broker and cache; ephemeral in dev (add PVC for prod if needed).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "triage.fullname" . }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "triage.fullname" . }}-redis
spec:
  selector:
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
{{- end }}
