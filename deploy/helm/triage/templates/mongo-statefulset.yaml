{{- if .Values.mongo.enabled }}
# MongoDB StatefulSet — document store for reviews; PVC retains data across pod restarts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "triage.fullname" . }}-mongo
  labels:
    {{- include "triage.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.mongo.storageClassName }}
  storageClassName: {{ .Values.mongo.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mongo.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "triage.fullname" . }}-mongo
  labels:
    {{- include "triage.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "triage.fullname" . }}-mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mongo
        {{- include "triage.labels" . | nindent 8 }}
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.mongo.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "triage.fullname" . }}-mongo
spec:
  selector:
    app.kubernetes.io/component: mongo
  ports:
    - port: 27017
{{- end }}
