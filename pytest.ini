[pytest]
# Pre-push: ai_service unit tests + integration guardrails/stack checks only.
# Legacy Django tests under backend/core and backend/health are excluded (separate Poetry env).
pythonpath = ai_service
testpaths =
    ai_service/tests
    integration_tests
addopts = -q
norecursedirs = backend node_modules frontend .git .venv ai_service/.venv
